services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saboreo
      POSTGRES_USER: saboreo
      POSTGRES_PASSWORD: saboreo_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/migration_001.sql:/docker-entrypoint-initdb.d/02_migration_001.sql:ro
      - ./database/migration_002.sql:/docker-entrypoint-initdb.d/03_migration_002.sql:ro
      - ./database/migration_003.sql:/docker-entrypoint-initdb.d/04_migration_003.sql:ro
      - ./database/migration_004.sql:/docker-entrypoint-initdb.d/05_migration_004.sql:ro
      - ./database/migration_005.sql:/docker-entrypoint-initdb.d/06_migration_005.sql:ro
      - ./database/migration_006.sql:/docker-entrypoint-initdb.d/07_migration_006.sql:ro
      - ./database/migration_007.sql:/docker-entrypoint-initdb.d/08_migration_007.sql:ro
      - ./database/migration_008.sql:/docker-entrypoint-initdb.d/09_migration_008.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/10_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saboreo -d saboreo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "9021:9021"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
      - ./uploads:/app/uploads
    environment:
      NODE_ENV: development
      PORT: 9021
      FRONTEND_URL: http://localhost:9031
      DATABASE_URL: postgresql://saboreo:saboreo_secret@postgres:5432/saboreo
      JWT_SECRET: dev-secret-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      # Host 9020 lo ocupa otro proyecto (gestorproyectos); se publica en 9031
      # para evitar la colisión. FRONTEND_URL (CORS) debe coincidir con este puerto.
      - "9031:9020"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_URL: ""
      # URL interna del backend para los fetch del lado servidor (SSR loaders).
      # En el navegador se usa VITE_API_URL (relativo); en el servidor se llama directo.
      BACKEND_INTERNAL_URL: "http://backend:9021"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
